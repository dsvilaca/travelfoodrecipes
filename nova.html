<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a4a52" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Abrir Travel Food Recipes</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: #eef3f2;
      color: #14282c;
      padding: 28px 20px;
      text-align: center;
    }
    .card {
      width: min(360px, 100%);
      background: #fff;
      border-radius: 18px;
      padding: 28px 22px;
      box-shadow: 0 8px 28px rgba(20, 40, 44, 0.1);
    }
    h1 { font-size: 1.25rem; margin: 0 0 10px; }
    p { margin: 0 0 18px; color: #6a7d81; line-height: 1.45; font-size: 0.95rem; }
    a.btn, button.btn {
      display: block;
      width: 100%;
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 14px 16px;
      background: #1a4a52;
      color: #f4f8f7;
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      cursor: pointer;
      margin-top: 10px;
    }
    a.secondary {
      display: inline-block;
      margin-top: 16px;
      color: #2a6b74;
      font-weight: 700;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Travel Food Recipes</h1>
    <p id="msg">A limpar a versão antiga deste telemóvel…</p>
    <button class="btn" id="btn" type="button">Abrir app nova</button>
    <a class="secondary" href="./index.html?v=9">Se não abrir, toca aqui</a>
  </div>
  <script>
    async function limpar() {
      try {
        if ("serviceWorker" in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((r) => r.unregister()));
        }
        if (window.caches && caches.keys) {
          const keys = await caches.keys();
          await Promise.all(keys.map((k) => caches.delete(k)));
        }
        try { localStorage.removeItem("tfr-build"); } catch (e) {}
      } catch (e) { /* ignore */ }
    }

    async function abrir() {
      document.getElementById("msg").textContent = "A abrir a versão nova…";
      await limpar();
      location.href = "./index.html?v=9&t=" + Date.now();
    }

    document.getElementById("btn").addEventListener("click", abrir);
    // Tenta automaticamente; se o Safari bloquear, o botão fica disponível
    limpar().then(function () {
      setTimeout(abrir, 400);
    });
  </script>
</body>
</html>
